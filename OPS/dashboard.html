<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arete & Co. — Client Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* [KEEPING YOUR EXACT CSS UNTOUCHED] */
  :root {
    --charcoal:#1A1A1B;--obsidian:#111112;--linen:#F4F1EA;
    --linen-dim:#b8b4a8;--moss:#7FFF00;--moss-dim:#5acc00;
    --dark2:#2a2a2b;--gray:#888580;--red:#ff4d4d;--amber:#ffb347;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--obsidian);color:var(--linen);font-family:'Space Mono',monospace;min-height:100vh;cursor:crosshair;}

  #login-screen{position:fixed;inset:0;background:var(--obsidian);z-index:9000;display:flex;align-items:center;justify-content:center;}
  #login-screen.hidden{display:none;}
  .login-box{background:var(--charcoal);border:1px solid var(--dark2);border-top:2px solid var(--moss);padding:2.5rem;width:100%;max-width:360px;position:relative;}
  .login-wordmark{font-weight:700;font-size:.8rem;letter-spacing:.3em;margin-bottom:.3rem;}
  .login-wordmark span{color:var(--moss);}
  .login-sub{font-size:.55rem;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin-bottom:2rem;}
  .login-label{font-size:.55rem;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;display:block;margin-bottom:.4rem;}
  .login-input{width:100%;background:var(--obsidian);border:1px solid var(--dark2);color:var(--linen);font-family:'Space Mono',monospace;font-size:.8rem;padding:.65rem .85rem;outline:none;margin-bottom:1.25rem;}
  .login-btn{width:100%;background:var(--moss);color:var(--obsidian);border:none;font-family:'Space Mono',monospace;font-weight:700;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.75rem;cursor:pointer;}
  .login-error{font-size:.6rem;color:var(--red);margin-top:.75rem;min-height:1rem;}

  #app{display:none;}
  #app.visible{display:block;}

  header{background:var(--charcoal);border-bottom:1px solid var(--dark2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
  .logo{font-weight:700;font-size:.75rem;letter-spacing:.25em;}
  .logo span{color:var(--moss);}
  .header-right{display:flex;align-items:center;gap:1.5rem;}
  .header-stat{font-size:.6rem;letter-spacing:.12em;color:var(--gray);text-transform:uppercase;}
  .header-stat strong{color:var(--moss);font-size:.75rem;}
  .btn-add{background:var(--moss);color:var(--obsidian);border:none;font-family:'Space Mono',monospace;font-weight:700;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.45rem 1rem;cursor:pointer;}
  .btn-logout{background:none;border:1px solid var(--dark2);color:var(--gray);font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;padding:.35rem .75rem;cursor:pointer;}

  main{padding:1.5rem 2rem 4rem;max-width:1400px;margin:0 auto;}
  .stats-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--dark2);border:1px solid var(--dark2);margin-bottom:2rem;}
  .stat-cell{background:var(--charcoal);padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.3rem;}
  .stat-label{font-size:.55rem;letter-spacing:.2em;color:var(--gray);text-transform:uppercase;}
  .stat-value{font-size:1.5rem;font-weight:700;color:var(--linen);line-height:1;}
  .stat-value.moss{color:var(--moss);}
  .stat-sub{font-size:.6rem;color:var(--gray);}

  .pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;align-items:start;}
  .column-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--dark2);}
  .col-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--linen-dim);}
  .col-count{font-size:.6rem;font-weight:700;color:var(--moss);background:rgba(127,255,0,.1);padding:.15rem .4rem;}
  .col-line{height:2px;margin-bottom:1rem;}

  .card{background:var(--charcoal);border:1px solid var(--dark2);border-left:2px solid var(--moss);padding:1rem;margin-bottom:.75rem;cursor:pointer;transition:all 0.2s;}
  .card:hover{border-color:var(--moss);transform:translateY(-2px);}
  .card-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--linen);margin-bottom:.25rem;}
  .card-project{font-size:.6rem;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:0.5rem;}
  .card-value{font-size:.65rem;font-weight:700;color:var(--moss);}
  .card-date{font-size:.55rem;color:var(--gray);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-wordmark">ARETE <span>&</span> CO.</div>
    <div class="login-sub">Client Pipeline — Private Access</div>
    <label class="login-label">Password</label>
    <input class="login-input" id="login-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')attemptLogin()">
    <button class="login-btn" id="login-btn" onclick="attemptLogin()">Enter Dashboard</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">ARETE <span>&</span> CO. <span style="color:var(--gray);font-weight:400;margin-left:.5rem;">/ CLIENT PIPELINE</span></div>
    <div class="header-right">
      <div class="header-stat">Pipeline <strong id="hdr-value">$0</strong></div>
      <div class="header-stat">Active <strong id="hdr-active">0</strong></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="stats-bar">
      <div class="stat-cell"><span class="stat-label">Total Leads</span><span class="stat-value" id="stat-total">0</span><span class="stat-sub">all stages</span></div>
      <div class="stat-cell"><span class="stat-label">Active</span><span class="stat-value" id="stat-active">0</span><span class="stat-sub">in project</span></div>
      <div class="stat-cell"><span class="stat-label">Pipeline Value</span><span class="stat-value moss" id="stat-value">$0</span><span class="stat-sub">projected</span></div>
      <div class="stat-cell"><span class="stat-label">Collected</span><span class="stat-value moss">$0</span><span class="stat-sub">payments received</span></div>
      <div class="stat-cell"><span class="stat-label">Closed Won</span><span class="stat-value" id="stat-closed-won">0</span><span class="stat-sub">completed</span></div>
      <div class="stat-cell"><span class="stat-label">System</span><span class="stat-value moss">LIVE</span><span class="stat-sub">connected</span></div>
    </div>

    <div class="pipeline-view active" id="view-pipeline">
      <div class="pipeline">
        <div><div class="column-header"><span class="col-title">Lead</span><span class="col-count" id="cnt-lead">0</span></div><div class="col-line" style="background:var(--gray)"></div><div id="cards-lead"></div></div>
        <div><div class="column-header"><span class="col-title">Brief Sent</span><span class="col-count" id="cnt-brief">0</span></div><div class="col-line" style="background:var(--linen-dim)"></div><div id="cards-brief"></div></div>
        <div><div class="column-header"><span class="col-title">Proposal</span><span class="col-count" id="cnt-proposal">0</span></div><div class="col-line" style="background:var(--amber)"></div><div id="cards-proposal"></div></div>
        <div><div class="column-header"><span class="col-title">Active</span><span class="col-count" id="cnt-active">0</span></div><div class="col-line" style="background:var(--moss)"></div><div id="cards-active"></div></div>
        <div><div class="column-header"><span class="col-title">Closed</span><span class="col-count" id="cnt-closed">0</span></div><div class="col-line" style="background:var(--moss-dim)"></div><div id="cards-closed"></div></div>
      </div>
    </div>
  </main>
</div>

<script>
  // SUPABASE CONFIG
  const supabaseUrl = 'https://etsztcmmyhephvrrdpyp.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0c3p0Y21teWhlcGh2cnJkcHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDAxNzYsImV4cCI6MjA4ODMxNjE3Nn0.1bT6mjYxep88pnibQyyWikg2HtTUF8at5NGPXB3VmzI';
  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // 1. AUTH LOGIC (PASSWORD ONLY)
  async function attemptLogin() {
    const password = document.getElementById('login-pw').value;
    const btn = document.getElementById('login-btn');
    const email = 'inquire.aseology@gmail.com'; 

    btn.innerText = "AUTHENTICATING...";

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
      document.getElementById('login-error').innerText = "ACCESS DENIED: " + error.message;
      btn.innerText = "ENTER DASHBOARD";
    } else {
      initApp();
    }
  }

  async function initApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    fetchPipeline();
  }

  async function logout() {
    await _supabase.auth.signOut();
    location.reload();
  }

  // 2. LIVE DATA FETCHING
  async function fetchPipeline() {
    const { data: projects, error } = await _supabase.from('projects').select('*');
    if (error) return console.error(error);

    // Reset columns
    const stages = ['lead', 'brief', 'proposal', 'active', 'closed'];
    stages.forEach(s => {
        document.getElementById(`cards-${s}`).innerHTML = '';
        document.getElementById(`cnt-${s}`).innerText = '0';
    });

    let totalValue = 0;

    projects.forEach(p => {
        const stage = p.stage ? p.stage.toLowerCase() : 'lead';
        const container = document.getElementById(`cards-${stage}`);
        const val = p.value || 0;
        totalValue += val;

        if (container) {
            container.innerHTML += `
                <div class="card">
                    <div class="card-name">${p.name || 'Anonymous'}</div>
                    <div class="card-project">${p.project_name || 'No Project Name'}</div>
                    <div class="card-meta">
                        <span class="card-value">$${val}</span>
                        <span class="card-date">${new Date(p.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `;
            const countEl = document.getElementById(`cnt-${stage}`);
            countEl.innerText = parseInt(countEl.innerText) + 1;
        }
    });

    // Update Dashboard Stats
    document.getElementById('stat-total').innerText = projects.length;
    document.getElementById('stat-active').innerText = projects.filter(p => p.stage === 'active').length;
    document.getElementById('hdr-active').innerText = projects.filter(p => p.stage === 'active').length;
    document.getElementById('stat-closed-won').innerText = projects.filter(p => p.stage === 'closed').length;
    
    const formattedValue = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(totalValue);
    document.getElementById('stat-value').innerText = formattedValue;
    document.getElementById('hdr-value').innerText = formattedValue;
  }

  // 3. AUTO-LOGIN CHECK
  async function checkSession() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) initApp();
  }
  checkSession();
</script>
</body>
</html>
