<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arete & Co. — Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --charcoal:#1A1A1B;--obsidian:#111112;--linen:#F4F1EA;
    --linen-dim:#b8b4a8;--moss:#7FFF00;--moss-dim:#5acc00;
    --dark2:#2a2a2b;--gray:#888580;--red:#ff4d4d;--amber:#ffb347;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--obsidian);color:var(--linen);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}

  /* LOGIN OVERLAY */
  #login-screen{position:fixed;inset:0;background:var(--obsidian);z-index:9999;display:flex;align-items:center;justify-content:center;}
  #login-screen.hidden{display:none;}
  .login-box{background:var(--charcoal);border:1px solid var(--dark2);border-top:2px solid var(--moss);padding:2.5rem;width:100%;max-width:360px;position:relative;}
  .login-wordmark{font-weight:700;font-size:.8rem;letter-spacing:.3em;margin-bottom:.3rem;}
  .login-wordmark span{color:var(--moss);}
  .login-sub{font-size:.55rem;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin-bottom:2rem;}
  .login-label{font-size:.55rem;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;display:block;margin-bottom:.4rem;}
  .login-input{width:100%;background:var(--obsidian);border:1px solid var(--dark2);color:var(--linen);font-family:'Space Mono',monospace;font-size:.8rem;padding:.65rem .85rem;outline:none;margin-bottom:1.25rem;}
  .login-btn{width:100%;background:var(--moss);color:var(--obsidian);border:none;font-family:'Space Mono',monospace;font-weight:700;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.75rem;cursor:pointer;}
  .login-error{font-size:.6rem;color:var(--red);margin-top:.75rem;min-height:1rem;}

  /* APP LAYOUT */
  #app{display:none; opacity:0; transition: opacity 0.5s ease;}
  #app.visible{display:block; opacity:1;}
  header{background:var(--charcoal);border-bottom:1px solid var(--dark2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
  .logo{font-weight:700;font-size:.75rem;letter-spacing:.25em;}
  .logo span{color:var(--moss);}
  .btn-logout{background:none;border:1px solid var(--dark2);color:var(--gray);font-family:'Space Mono',monospace;font-size:.55rem;padding:.35rem .75rem;cursor:pointer;}

  main{padding:2rem;max-width:1400px;margin:0 auto;}
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--dark2);border:1px solid var(--dark2);margin-bottom:2rem;}
  .stat-cell{background:var(--charcoal);padding:1.5rem;display:flex;flex-direction:column;gap:.3rem;}
  .stat-label{font-size:.55rem;letter-spacing:.2em;color:var(--gray);text-transform:uppercase;}
  .stat-value{font-size:1.5rem;font-weight:700;color:var(--linen);}

  /* KANBAN PIPELINE */
  .pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;}
  .column-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--dark2);}
  .col-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--linen-dim);}
  .col-count{font-size:.6rem;font-weight:700;color:var(--moss);background:rgba(127,255,0,.1);padding:.15rem .4rem;}
  
  .card{background:var(--charcoal);border:1px solid var(--dark2);border-left:2px solid var(--moss);padding:1rem;margin-bottom:.75rem;transition:transform 0.2s;}
  .card:hover{transform: translateY(-2px); border-color: var(--moss);}
  .card-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--linen);margin-bottom:.25rem;}
  .card-project{font-size:.6rem;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-date{font-size:.5rem;color:var(--gray);margin-top:0.5rem;display:block;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-wordmark">ARETE <span>&</span> CO.</div>
    <div class="login-sub">Private Terminal — Access Required</div>
    <label class="login-label">Password</label>
    <input class="login-input" id="login-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')attemptLogin()">
    <button class="login-btn" id="login-btn" onclick="attemptLogin()">Decrypt Access</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">ARETE <span>&</span> CO. <span style="color:var(--gray);font-weight:400;margin-left:.5rem;">/ PIPELINE</span></div>
    <div class="header-right"><button class="btn-logout" onclick="logout()">Logout</button></div>
  </header>

  <main>
    <div class="stats-bar">
      <div class="stat-cell"><span class="stat-label">Total Leads</span><span class="stat-value" id="stat-total">0</span></div>
      <div class="stat-cell"><span class="stat-label">Active Projects</span><span class="stat-value" style="color:var(--moss)" id="stat-active">0</span></div>
      <div class="stat-cell"><span class="stat-label">System Status</span><span class="stat-value" style="font-size: 1rem; letter-spacing: 0.1em;">ONLINE</span></div>
    </div>

    <div class="pipeline">
      <div><div class="column-header"><span class="col-title">Lead</span><span class="col-count" id="cnt-lead">0</span></div><div id="cards-lead"></div></div>
      <div><div class="column-header"><span class="col-title">Brief</span><span class="col-count" id="cnt-brief">0</span></div><div id="cards-brief"></div></div>
      <div><div class="column-header"><span class="col-title">Proposal</span><span class="col-count" id="cnt-proposal">0</span></div><div id="cards-proposal"></div></div>
      <div><div class="column-header"><span class="col-title">Active</span><span class="col-count" id="cnt-active">0</span></div><div id="cards-active"></div></div>
      <div><div class="column-header"><span class="col-title">Closed</span><span class="col-count" id="cnt-closed">0</span></div><div id="cards-closed"></div></div>
    </div>
  </main>
</div>

<script>
  const supabaseUrl = 'https://etsztcmmyhephvrrdpyp.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0c3p0Y21teWhlcGh2cnJkcHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDAxNzYsImV4cCI6MjA4ODMxNjE3Nn0.1bT6mjYxep88pnibQyyWikg2HtTUF8at5NGPXB3VmzI';
  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function attemptLogin() {
    const password = document.getElementById('login-pw').value;
    const errorDiv = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    
    btn.innerText = "AUTHENTICATING...";
    // HARDCODED EMAIL
    const { error } = await _supabase.auth.signInWithPassword({ 
        email: 'inquire.aseology@gmail.com', 
        password 
    });

    if (error) {
      errorDiv.innerText = "DENIED: " + error.message;
      btn.innerText = "DECRYPT ACCESS";
    } else {
      showDashboard();
    }
  }

  async function showDashboard() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadData();
  }

  async function loadData() {
    const { data: projects } = await _supabase.from('projects').select('*');
    if (!projects) return;

    // Reset columns
    const columns = ['lead', 'brief', 'proposal', 'active', 'closed'];
    columns.forEach(c => {
      document.getElementById(`cards-${c}`).innerHTML = '';
      document.getElementById(`cnt-${c}`).innerText = '0';
    });

    projects.forEach(p => {
      const stage = p.stage ? p.stage.toLowerCase() : 'lead';
      const container = document.getElementById(`cards-${stage}`);
      if (container) {
        container.innerHTML += `
          <div class="card">
            <div class="card-name">${p.name || 'Anonymous'}</div>
            <div class="card-project">${p.project_name || 'No Description'}</div>
            <span class="card-date">${new Date(p.created_at).toLocaleDateString()}</span>
          </div>
        `;
        const count = document.getElementById(`cnt-${stage}`);
        count.innerText = parseInt(count.innerText) + 1;
      }
    });

    document.getElementById('stat-total').innerText = projects.length;
    document.getElementById('stat-active').innerText = projects.filter(p => p.stage === 'active').length;
  }

  async function logout() {
    await _supabase.auth.signOut();
    location.reload();
  }

  // Auto-check session on load
  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) showDashboard();
  }
  init();
</script>
</body>
</html>
